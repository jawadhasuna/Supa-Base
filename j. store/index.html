<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J. Official - Jawad AI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      a {
        text-decoration: none;
        color: inherit;
        cursor: pointer;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: #fff;
        width: 100%;
        border-bottom: 1px solid #eee;
      }
      .top-bar {
        background: #e8e4e1;
        display: flex;
        justify-content: space-between;
        padding: 8px 45px;
        font-size: 10px;
        font-weight: 600;
      }
      .main-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 45px;
        height: 80px;
        position: relative;
      }
      .logo {
        font-family: "Playfair Display", serif;
        font-size: 45px;
        font-weight: 900;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        letter-spacing: -3px;
      }
      .nav-links {
        display: flex;
        gap: 25px;
        font-size: 13px;
        font-weight: 700;
      }
      .hero {
        background: #0b1a3d;
        height: 400px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
      }
      .trending-section {
        padding: 40px 45px;
      }
      .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-top: 20px;
      }
      .product-card {
        cursor: pointer;
        background: #f7f7f7;
        padding: 15px;
        text-align: center;
        transition: 0.3s;
      }
      .product-card img {
        width: 100%;
        height: 300px;
        object-fit: cover;
      }
      .product-name {
        font-size: 12px;
        font-weight: 600;
        margin: 10px 0;
      }
      .price-row {
        font-size: 14px;
        font-weight: 700;
        color: #c40000;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="top-bar">
        <div>
          <a href="signin.html">SIGN IN</a> |
          <a href="tracking.html">TRACKING INFO</a>
        </div>
      </div>
      <div class="main-header">
        <div class="nav-links"><a>WOMEN</a></div>
        <div class="logo">J.</div>
        <div class="user-actions">
          <a href="cart.html">BAG (<span id="cart-count">0</span>)</a>
        </div>
      </div>
    </header>

    <div class="hero"><h1>GRAND FESTIVE SALE</h1></div>

    <section class="trending-section">
      <h2>TRENDING NOW</h2>
      <div class="product-grid" id="product-container"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseClient = supabase.createClient(
        "https://yymqfmteplwncosqcgko.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5bXFmbXRlcGx3bmNvc3FjZ2tvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDk2NDMsImV4cCI6MjA5Nzc4NTY0M30.ZRNuE48tuVDSX8B0AQLOzqO4ENoKDFnOnyrAnY0dAqM",
      );

      // Function to update the bag counter in the header
      function updateBagCounter() {
        let cart = JSON.parse(localStorage.getItem("j_cart")) || [];
        document.getElementById("cart-count").innerText = cart.length;
      }

      async function loadProducts() {
        const container = document.getElementById("product-container");

        const { data: products, error } = await supabaseClient
          .from("products")
          .select("*");

        if (error) {
          container.innerHTML = `<p>Error loading products: ${error.message}</p>`;
          return;
        }

        container.innerHTML = products
          .map(
            (p) => `
          <div class="product-card" onclick="window.location.href = 'product-detail.html?id=${p.id}'">
            <img src="${p.image_url}" alt="${p.name}">
            <div class="product-name">${p.name}</div>
            <div class="price-row">PKR ${p.price.toLocaleString()}</div>
          </div>
        `,
          )
          .join("");
      }

      // Updated onload to run both required functions
      window.onload = () => {
        loadProducts();
        updateBagCounter();
      };
    </script>
  </body>
</html>
