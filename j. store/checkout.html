<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checkout - Jawad AI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      .checkout-container {
        display: flex;
        min-height: 90vh;
      }
      .checkout-left {
        flex: 1.2;
        padding: 50px 80px;
        border-right: 1px solid #eee;
      }
      .checkout-right {
        flex: 1;
        background: #fafafa;
        padding: 50px 40px;
      }
      input {
        width: 100%;
        padding: 15px;
        border: 1px solid #d9d9d9;
        border-radius: 5px;
        margin-bottom: 15px;
      }
      .pay-now-btn {
        background: #000;
        color: #fff;
        width: 100%;
        padding: 20px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
      }
      #success-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.95);
        z-index: 2000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .summary-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div id="success-overlay">
      <h1>Order Confirmed!</h1>
      <button
        class="pay-now-btn"
        style="width: 250px"
        onclick="window.location.href = 'index.html'"
      >
        Continue Shopping
      </button>
    </div>

    <div class="checkout-container">
      <div class="checkout-left">
        <input
          type="email"
          id="user-email"
          placeholder="Email Address"
          required
        />
        <input
          type="text"
          id="user-address"
          placeholder="Complete Address"
          required
        />
        <button class="pay-now-btn" onclick="completeOrder()">
          Complete Order
        </button>
      </div>
      <div class="checkout-right">
        <h3>Order Summary</h3>
        <div id="order-summary-list" style="margin: 20px 0"></div>
        <hr />
        <div style="margin-top: 20px; font-weight: bold; font-size: 18px">
          Total: <span id="final-total">PKR 0</span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // CORRECTED: Rename variable to 'supabaseClient'
      const supabaseClient = supabase.createClient(
        "https://yymqfmteplwncosqcgko.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5bXFmbXRlcGx3bmNvc3FjZ2tvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDk2NDMsImV4cCI6MjA5Nzc4NTY0M30.ZRNuE48tuVDSX8B0AQLOzqO4ENoKDFnOnyrAnY0dAqM",
      );

      let calculatedTotal = 0;

      function loadSummary() {
        const cart = JSON.parse(localStorage.getItem("j_cart")) || [];
        const container = document.getElementById("order-summary-list");
        calculatedTotal = 0;

        container.innerHTML = cart
          .map((item) => {
            const itemPrice = parseInt(item.price.toString().replace(/,/g, ""));
            const itemTotal = itemPrice * (item.quantity || 1);
            calculatedTotal += itemTotal;
            return `<div class="summary-item"><span>${item.name} (x${item.quantity})</span> <span>PKR ${itemTotal.toLocaleString()}</span></div>`;
          })
          .join("");

        document.getElementById("final-total").innerText =
          "PKR " + calculatedTotal.toLocaleString();
      }

      async function completeOrder() {
        const cart = JSON.parse(localStorage.getItem("j_cart")) || [];
        const email = document.getElementById("user-email").value;

        if (!email || cart.length === 0) {
          alert("Please enter your email and ensure your cart is not empty!");
          return;
        }

        // CORRECTED: Use 'supabaseClient' here
        const { data, error } = await supabaseClient
          .from("orders")
          .insert([
            { user_email: email, total_amount: calculatedTotal, items: cart },
          ]);

        if (error) {
          alert("Error saving order: " + error.message);
        } else {
          document.getElementById("success-overlay").style.display = "flex";
          localStorage.removeItem("j_cart");
        }
      }

      window.onload = loadSummary;
    </script>
  </body>
</html>
