<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - Jawad AI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      a {
        text-decoration: none;
        color: inherit;
        cursor: pointer;
      }

      /* Unified Header */
      header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: #fff;
        width: 100%;
        border-bottom: 1px solid #eee;
      }
      .top-bar {
        background: #e8e4e1;
        display: flex;
        justify-content: space-between;
        padding: 8px 45px;
        font-size: 10px;
        font-weight: 600;
      }
      .main-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 45px;
        height: 80px;
        position: relative;
      }
      .logo {
        font-family: "Playfair Display", serif;
        font-size: 45px;
        font-weight: 900;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        letter-spacing: -3px;
      }
      .nav-links {
        display: flex;
        gap: 25px;
        font-size: 13px;
        font-weight: 700;
      }
      .user-actions {
        display: flex;
        gap: 15px;
        font-size: 11px;
        font-weight: 600;
      }

      /* Sign In Layout */
      body {
        background-color: #f6f6f6;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .signin-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
      }
      .signin-card {
        background: white;
        padding: 40px;
        width: 100%;
        max-width: 440px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        text-align: center;
      }

      .signin-card h2 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
        text-align: left;
      }
      .signin-card p {
        color: #666;
        font-size: 14px;
        margin-bottom: 24px;
        text-align: left;
      }

      .shop-btn {
        background: #000;
        color: white;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
        margin-bottom: 24px;
        transition: 0.3s;
      }
      .shop-btn:hover {
        background: #333;
      }

      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        color: #999;
        font-size: 12px;
        margin-bottom: 24px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e0e0e0;
      }
      .divider span {
        padding: 0 10px;
      }

      .input-group {
        text-align: left;
        margin-bottom: 16px;
      }
      input {
        width: 100%;
        padding: 14px;
        border: 1px solid #dcdcdc;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
      }
      input:focus {
        border-color: #000;
      }

      footer {
        padding: 40px 45px;
        background: #000;
        color: white;
        text-align: center;
        font-size: 12px;
        margin-top: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="top-bar">
        <div>
          <a href="signin.html">SIGN IN</a> |
          <a href="tracking.html">TRACKING INFO</a>
        </div>
        <div>Step Into the Season - SHOP NOW</div>
      </div>
      <div class="main-header">
        <div class="nav-links">
          <a href="index.html">WOMEN</a>
          <a href="index.html">MEN</a>
        </div>
        <a href="index.html" class="logo">J.</a>
        <div class="user-actions">
          <a href="javascript:void(0)">SEARCH</a>
          <a href="cart.html">BAG (<span id="cart-count">0</span>)</a>
        </div>
      </div>
    </header>

    <div class="signin-container">
      <div class="signin-card">
        <h2>Sign in</h2>
        <p>Sign in or create an account</p>
        <button class="shop-btn" onclick="window.location.href = 'index.html'">
          Continue Shopping
        </button>
        <div class="divider"><span>or</span></div>
        <div class="input-group">
          <input type="email" placeholder="Email Address" required />
        </div>
        <button class="shop-btn" style="background: #eee; color: #000">
          Continue
        </button>
      </div>
    </div>

    <footer>
      <p>© 2026 J. All Rights Reserved | Contact: eshop@junaidjamshed.com</p>
    </footer>

    <script>
      function updateBagCounter() {
        let cart = JSON.parse(localStorage.getItem("j_cart")) || [];
        document.getElementById("cart-count").innerText = cart.length;
      }
      window.addEventListener("load", updateBagCounter);
    </script>
  </body>
</html>
